<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gyro Controlled Block</title>
    <style>
        #block {
            width: 50px;
            height: 50px;
            background-color: blue;
            position: absolute;
            top: 50%;
            left: 0;
        }
    </style>
</head>
<body>

<div id="block"></div>

<script>
    let block = document.getElementById('block');
    let speed = 0;
    let position = 0;

    window.addEventListener('deviceorientation', function(event) {
        let gamma = event.gamma; // Rotation around the Y-axis in degrees

        // Normalize the gamma value to a speed between -5 and 5
        speed = gamma / 18; // 90 degrees would be max speed, adjust this factor as needed
    });

    function moveBlock() {
        position += speed;

        // Keep the block within the viewport
        if (position < 0) position = 0;
        if (position > window.innerWidth - block.offsetWidth) position = window.innerWidth - block.offsetWidth;

        block.style.left = position + 'px';

        requestAnimationFrame(moveBlock);
    }

    moveBlock();
</script>

</body>
</html>
